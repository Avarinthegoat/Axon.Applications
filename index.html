<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #171717; }
        .axon-header { font-family: 'Bodoni Moda', serif; }
        .gold-bg { background-color: #CFA050; }
        .gold-text { color: #CFA050; }
        .hidden { display: none; }
        .glass-card { border: 1px solid #f0f0f0; transition: all 0.3s ease; border-radius: 2rem; }
        .glass-card:hover { border-color: #CFA050; transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-10 py-8 border-b border-gray-50 bg-white sticky top-0 z-50">
        <div class="axon-header text-3xl italic tracking-tighter">
            AXON <span class="font-light text-[10px] tracking-[0.5em] uppercase not-italic ml-2 text-gray-300">Applications</span>
        </div>
        <div id="nav-right" class="flex items-center gap-6"></div>
    </nav>

    <div id="login-screen" class="max-w-md mx-auto mt-32 px-6 text-center">
        <h2 class="text-4xl font-black tracking-tighter mb-4 uppercase italic">Identity</h2>
        <input type="text" id="username-input" placeholder="Discord Username" class="w-full p-5 border border-gray-100 rounded-2xl mb-4 focus:border-[#CFA050] outline-none font-bold">
        <button onclick="saveUser()" class="w-full gold-bg text-white font-black py-5 rounded-2xl hover:bg-black transition uppercase text-xs tracking-widest">Enter Terminal</button>
    </div>

    <div id="main-hub" class="max-w-6xl mx-auto py-20 px-8 hidden">
        <div class="grid md:grid-cols-3 gap-8">
            <div class="glass-card p-12">
                <h3 class="text-[10px] font-black tracking-[0.3em] text-gray-400 mb-6 uppercase">Support Agent</h3>
                <p id="status-support" class="text-[9px] font-bold mb-10 tracking-widest text-green-500">STATUS: OPEN</p>
                <button onclick="openForm('Support Agent')" class="w-full py-4 bg-black text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:gold-bg transition">Apply Now</button>
            </div>
            </div>
    </div>

    <div id="admin-dashboard" class="max-w-4xl mx-auto py-20 px-8 hidden">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-4xl font-black tracking-tighter italic gold-text">Developer Dashboard</h2>
            <button onclick="importData()" class="text-[10px] font-black gold-bg text-white px-6 py-2 rounded-full">SYNC FROM DISCORD</button>
        </div>
        
        <div id="admin-list" class="space-y-4">
            </div>
    </div>

    <div id="form-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-md z-[100] flex items-center justify-center hidden p-6">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-12 shadow-2xl relative">
            <button onclick="closeForm()" class="absolute top-10 right-10 text-gray-300 hover:text-black font-bold uppercase text-[10px]">Close</button>
            <h2 id="form-role-title" class="text-3xl font-black tracking-tighter uppercase mb-8 gold-text italic"></h2>
            <div class="space-y-6">
                <input type="number" id="age" placeholder="Age" class="w-full p-4 bg-gray-50 rounded-xl outline-none border-none">
                <textarea id="xp" placeholder="Experience" rows="3" class="w-full p-4 bg-gray-50 rounded-xl outline-none border-none"></textarea>
                <textarea id="desc" placeholder="Why AXON?" rows="4" class="w-full p-4 bg-gray-50 rounded-xl outline-none border-none"></textarea>
                <button id="submit-btn" onclick="sendToDiscord()" class="w-full gold-bg text-white font-black py-5 rounded-2xl uppercase text-xs tracking-widest">Transmit</button>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "YOUR_DISCORD_WEBHOOK_URL"; 
        let user = localStorage.getItem('axon_username');
        let currentRole = "";
        
        // This holds the apps locally on YOUR screen
        let apps = JSON.parse(localStorage.getItem('axon_master_list')) || [];

        function saveUser() {
            const val = document.getElementById('username-input').value;
            if(!val) return;
            localStorage.setItem('axon_username', val);
            location.reload();
        }

        if(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-hub').classList.remove('hidden');
            renderNav();
        }

        function renderNav() {
            const navRight = document.getElementById('nav-right');
            navRight.innerHTML = `
                ${user === "Avarin" ? `<button onclick="toggleAdmin()" id="adm-btn" class="text-[9px] font-black border border-[#CFA050] px-4 py-2 rounded-full gold-text">DASHBOARD</button>` : ''}
                <span class="text-[10px] font-black uppercase text-gray-400">${user}</span>
                <button onclick="localStorage.removeItem('axon_username'); location.reload();" class="text-gray-200 hover:text-red-500 transition font-bold">✕</button>
            `;
        }

        function toggleAdmin() {
            const hub = document.getElementById('main-hub');
            const dash = document.getElementById('admin-dashboard');
            hub.classList.toggle('hidden');
            dash.classList.toggle('hidden');
            if(!dash.classList.contains('hidden')) renderAdminApps();
        }

        function sendToDiscord() {
            const btn = document.getElementById('submit-btn');
            const age = document.getElementById('age').value;
            const xp = document.getElementById('xp').value;
            const desc = document.getElementById('desc').value;

            const appData = { user, role: currentRole, age, xp, desc, id: Date.now() };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `**NEW APPLICATION DATA (COPY THIS FOR DASHBOARD):**\n\`\`\`json\n${JSON.stringify(appData)}\n\`\`\``,
                    embeds: [{ title: `New Application: ${currentRole}`, color: 13606992, fields: [{name:"User", value:user}]}]
                })
            }).then(() => {
                alert("Application Transmitted!");
                location.reload();
            });
        }

        // --- THE "POP UP" FIX ---
        // You copy the JSON block from Discord and paste it here
        function importData() {
            const data = prompt("Paste the JSON data from Discord logs:");
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    apps.push(parsed);
                    localStorage.setItem('axon_master_list', JSON.stringify(apps));
                    renderAdminApps();
                } catch(e) { alert("Invalid data!"); }
            }
        }

        function renderAdminApps() {
            const list = document.getElementById('admin-list');
            list.innerHTML = apps.map(a => `
                <div class="p-10 border border-gray-100 rounded-[2.5rem] bg-white hover:border-[#CFA050] transition">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h4 class="font-black text-2xl tracking-tighter italic uppercase">${a.user}</h4>
                            <p class="text-[10px] font-bold gold-text uppercase tracking-widest">${a.role}</p>
                        </div>
                        <button onclick="removeApp(${a.id})" class="text-red-300 hover:text-red-500 font-bold text-[10px] uppercase">Archive</button>
                    </div>
                    <div class="grid grid-cols-2 gap-8 text-xs mb-4">
                        <div><p class="text-gray-400 font-bold text-[9px] uppercase mb-1">Age</p><p class="font-bold">${a.age}</p></div>
                        <div><p class="text-gray-400 font-bold text-[9px] uppercase mb-1">Coding XP</p><p class="font-bold">${a.xp}</p></div>
                    </div>
                    <div><p class="text-gray-400 font-bold text-[9px] uppercase mb-1">Description</p><p class="text-xs text-gray-500 leading-relaxed">${a.desc}</p></div>
                </div>
            `).join('');
        }

        function removeApp(id) {
            apps = apps.filter(a => a.id !== id);
            localStorage.setItem('axon_master_list', JSON.stringify(apps));
            renderAdminApps();
        }

        function openForm(r) { currentRole = r; document.getElementById('form-role-title').innerText = r; document.getElementById('form-overlay').classList.remove('hidden'); }
        function closeForm() { document.getElementById('form-overlay').classList.add('hidden'); }
    </script>
</body>
</html>
