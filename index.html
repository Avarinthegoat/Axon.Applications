<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON | Recruitment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #171717; }
        .axon-header { font-family: 'Bodoni Moda', serif; }
        .gold-bg { background-color: #CFA050; }
        .hidden { display: none !important; }
        .glass-card { border: 1px solid #f3f4f6; transition: all 0.3s ease; border-radius: 2rem; }
        .glass-card:hover { border-color: #CFA050; transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-10 py-8 border-b border-gray-50 bg-white sticky top-0 z-50">
        <div class="axon-header text-3xl italic tracking-tighter">AXON</div>
        <div id="nav-right" class="flex items-center gap-6"></div>
    </nav>

    <div id="login-view" class="max-w-md mx-auto mt-32 px-6 text-center">
        <h2 class="text-4xl font-black tracking-tighter mb-4 uppercase italic">Identity</h2>
        <p class="text-gray-400 text-xs mb-10 tracking-widest uppercase">Enter Discord Username</p>
        <input type="text" id="username-in" placeholder="e.g. Avarin" class="w-full p-5 border border-gray-100 rounded-2xl mb-4 focus:border-[#CFA050] outline-none font-bold text-center">
        <button onclick="handleLogin()" class="w-full gold-bg text-white font-black py-5 rounded-2xl hover:bg-black transition uppercase text-[10px] tracking-widest">Enter Terminal</button>
    </div>

    <div id="hub-view" class="max-w-6xl mx-auto py-20 px-8 hidden">
        <div class="grid md:grid-cols-3 gap-8">
            <div class="glass-card p-12 text-center">
                <h3 class="text-[10px] font-black tracking-[0.3em] text-gray-400 mb-6 uppercase">Support Agent</h3>
                <p class="text-[9px] font-bold mb-10 text-green-500 tracking-widest">STATUS: OPEN</p>
                <button onclick="openForm('Support Agent')" class="w-full py-4 bg-black text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:gold-bg transition">Apply</button>
            </div>
        </div>

        <div class="mt-24 border-t border-gray-100 pt-16">
            <h3 class="text-[10px] font-black tracking-[0.4em] uppercase text-gray-300 mb-8 text-center">Submission Status</h3>
            <div id="status-list" class="max-w-xl mx-auto space-y-3">
                <p class="text-center text-gray-200 text-[10px] font-black py-10">NO LOCAL HISTORY</p>
            </div>
        </div>
    </div>

    <div id="admin-view" class="max-w-4xl mx-auto py-20 px-8 hidden">
        <h2 class="text-4xl font-black tracking-tighter italic gold-text mb-12">DIRECTOR DASHBOARD</h2>
        <div class="p-10 border-2 border-dashed border-gray-100 rounded-[2.5rem] text-center">
            <p class="text-gray-400 text-xs font-black uppercase mb-2">Live Webhook Active</p>
            <p class="text-gray-300 text-[10px]">All applications are transmitted directly to your Discord Staff Channel.</p>
        </div>
    </div>

    <div id="form-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-md z-[100] flex items-center justify-center hidden p-6">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-12 shadow-2xl relative">
            <button onclick="closeForm()" class="absolute top-10 right-10 text-gray-300 hover:text-black font-black">X</button>
            <h2 id="role-display" class="text-3xl font-black tracking-tighter uppercase mb-8 gold-text italic"></h2>
            <div class="space-y-5">
                <input type="number" id="age" placeholder="Age (13+)" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold">
                <textarea id="xp" placeholder="Coding Experience (1yr+ JS/HTML/CSS)" rows="3" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold"></textarea>
                <textarea id="desc" placeholder="Why AXON?" rows="4" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold"></textarea>
                <button id="sub-btn" onclick="submitApp()" class="w-full gold-bg text-white font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest">Transmit</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const WEBHOOK = "YOUR_DISCORD_WEBHOOK_URL"; 
        let user = localStorage.getItem('axon_user');
        let currentRole = "";

        // --- AUTH ---
        function handleLogin() {
            const name = document.getElementById('username-in').value;
            if(!name) return;
            localStorage.setItem('axon_user', name);
            window.location.reload();
        }

        function handleLogout() {
            localStorage.removeItem('axon_user');
            window.location.reload();
        }

        // --- LOAD LOGIC ---
        window.onload = () => {
            if(user) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('hub-view').classList.remove('hidden');
                renderNav();
                renderHistory();
            }
        }

        function renderNav() {
            const nav = document.getElementById('nav-right');
            const adminBtn = (user === "Avarin") ? `<button onclick="toggleAdmin()" id="adm-btn" class="text-[9px] font-black border border-[#CFA050] px-4 py-2 rounded-full gold-text">DASHBOARD</button>` : '';
            nav.innerHTML = `
                ${adminBtn}
                <span class="text-[10px] font-black uppercase text-gray-400">${user}</span>
                <button onclick="handleLogout()" class="text-gray-200 hover:text-red-500 font-black text-xs">✕</button>
            `;
        }

        function toggleAdmin() {
            const hub = document.getElementById('hub-view');
            const adm = document.getElementById('admin-view');
            hub.classList.toggle('hidden');
            adm.classList.toggle('hidden');
        }

        // --- FORM LOGIC ---
        function openForm(r) {
            currentRole = r;
            document.getElementById('role-display').innerText = r;
            document.getElementById('form-overlay').classList.remove('hidden');
        }

        function closeForm() {
            document.getElementById('form-overlay').classList.add('hidden');
        }

        function submitApp() {
            const btn = document.getElementById('sub-btn');
            const age = document.getElementById('age').value;
            const xp = document.getElementById('xp').value;
            const desc = document.getElementById('desc').value;

            if(!age || !xp || !desc) return alert("Please fill all fields!");

            btn.innerText = "TRANSMITTING...";
            btn.disabled = true;

            const payload = {
                username: "AXON RECRUITMENT",
                embeds: [{
                    title: `NEW APPLICATION: ${currentRole}`,
                    color: 13606992,
                    fields: [
                        { name: "Applicant", value: user, inline: true },
                        { name: "Age", value: age, inline: true },
                        { name: "Experience", value: xp },
                        { name: "Reason", value: desc }
                    ],
                    footer: { text: "Axon Hosting Management System" }
                }]
            };

            fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                const history = JSON.parse(localStorage.getItem('axon_history') || "[]");
                history.push({ role: currentRole, status: 'Sent to Staff' });
                localStorage.setItem('axon_history', JSON.stringify(history));
                alert("Application Transmitted to Avarin!");
                window.location.reload();
            }).catch(err => {
                alert("Error sending. Check Webhook URL.");
                btn.innerText = "TRANSMIT";
                btn.disabled = false;
            });
        }

        function renderHistory() {
            const list = document.getElementById('status-list');
            const data = JSON.parse(localStorage.getItem('axon_history') || "[]");
            if(data.length > 0) {
                list.innerHTML = data.map(h => `
                    <div class="flex justify-between items-center bg-gray-50 p-6 rounded-2xl border border-gray-100">
                        <span class="text-[10px] font-black uppercase text-gray-400">${h.role}</span>
                        <span class="text-[9px] font-black px-4 py-1.5 rounded-full bg-white border border-gray-100 text-green-500 uppercase">${h.status}</span>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
