<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #171717; overflow-x: hidden; }
        .axon-header { font-family: 'Bodoni Moda', serif; }
        .gold-bg { background-color: #CFA050; }
        .gold-text { color: #CFA050; }
        .hidden { display: none !important; }
        .glass-card { border: 1px solid #f3f4f6; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2.5rem; }
        .glass-card:hover { border-color: #CFA050; transform: translateY(-8px); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-12 py-8 border-b border-gray-50 bg-white sticky top-0 z-50">
        <div class="axon-header text-3xl italic tracking-tighter">AXON</div>
        <div id="nav-right" class="flex items-center gap-6"></div>
    </nav>

    <section id="login-view" class="max-w-md mx-auto mt-32 px-6 text-center">
        <h2 class="text-5xl font-black tracking-tighter mb-8 italic uppercase">Identity</h2>
        <input type="text" id="user-in" placeholder="Username" class="w-full p-6 bg-gray-50 border-none rounded-2xl mb-4 outline-none font-bold text-center focus:ring-2 ring-[#CFA050]">
        <button onclick="login()" class="w-full gold-bg text-white font-black py-6 rounded-2xl hover:bg-black transition uppercase text-[10px] tracking-widest">Enter Terminal</button>
    </section>

    <section id="hub-view" class="max-w-6xl mx-auto py-20 px-8 hidden">
        <div class="grid md:grid-cols-3 gap-8">
            <div class="glass-card p-12 text-center">
                <p class="text-[10px] font-black tracking-[0.4em] text-gray-300 mb-4 uppercase">Support Agent</p>
                <p class="text-[9px] font-bold text-green-500 mb-10 tracking-widest">● LIVE</p>
                <button onclick="openForm('Support Agent')" class="w-full py-4 bg-black text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:gold-bg transition">Apply</button>
            </div>
        </div>
        
        <div class="mt-32 pt-20 border-t border-gray-50">
            <h3 class="text-[10px] font-black tracking-[0.4em] uppercase text-gray-300 mb-10 text-center">Your Status</h3>
            <div id="user-apps" class="max-w-xl mx-auto space-y-3"></div>
        </div>
    </section>

    <section id="admin-view" class="max-w-4xl mx-auto py-20 px-8 hidden">
        <div class="flex justify-between items-center mb-16">
            <h2 class="text-4xl font-black tracking-tighter italic gold-text uppercase">Director Terminal</h2>
            <div class="flex items-center gap-2 text-[9px] font-bold text-green-500 uppercase tracking-widest">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Sync Active
            </div>
        </div>
        <div id="admin-feed" class="space-y-6"></div>
    </section>

    <div id="form-pop" class="fixed inset-0 bg-white/90 backdrop-blur-xl z-[100] flex items-center justify-center hidden p-6">
        <div class="w-full max-w-lg">
            <h2 id="role-title" class="text-4xl font-black tracking-tighter uppercase mb-10 gold-text italic"></h2>
            <div class="space-y-6">
                <input type="number" id="age" placeholder="Age" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold">
                <textarea id="xp" placeholder="1yr+ Experience?" rows="3" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold"></textarea>
                <textarea id="desc" placeholder="Why AXON?" rows="4" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold"></textarea>
                <div class="flex gap-4">
                    <button onclick="closeForm()" class="flex-1 bg-gray-100 text-gray-400 font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest">Cancel</button>
                    <button id="sub-btn" onclick="submit()" class="flex-[2] gold-bg text-white font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest">Transmit</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR SUPABASE KEYS HERE
        const URL = "YOUR_SUPABASE_URL";
        const KEY = "YOUR_SUPABASE_ANON_KEY";
        const client = supabase.createClient(URL, KEY);

        let currentUser = localStorage.getItem('axon_u');
        let currentRole = "";

        async function login() {
            const val = document.getElementById('user-in').value;
            if(!val) return;
            localStorage.setItem('axon_u', val);
            location.reload();
        }

        if(currentUser) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('hub-view').classList.remove('hidden');
            renderNav();
            syncUserApps();
            if(currentUser === "Avarin") {
                // REAL-TIME LISTENER: Pops up apps as they happen
                client.channel('apps').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'apps' }, () => syncAdminFeed()).subscribe();
                syncAdminFeed();
            }
        }

        function renderNav() {
            const nav = document.getElementById('nav-right');
            nav.innerHTML = `
                ${currentUser === "Avarin" ? `<button onclick="toggleAdmin()" id="adm-btn" class="text-[9px] font-black gold-text border border-[#CFA050] px-5 py-2 rounded-full">ADMIN</button>` : ''}
                <span class="text-[10px] font-black uppercase text-gray-400">${currentUser}</span>
                <button onclick="localStorage.clear(); location.reload();" class="text-gray-200 hover:text-red-500 font-black text-xs">✕</button>
            `;
        }

        function toggleAdmin() {
            document.getElementById('hub-view').classList.toggle('hidden');
            document.getElementById('admin-view').classList.toggle('hidden');
            document.getElementById('adm-btn').innerText = document.getElementById('admin-view').classList.contains('hidden') ? "ADMIN" : "HUB";
        }

        async function submit() {
            const btn = document.getElementById('sub-btn');
            const data = {
                user: currentUser, role: currentRole,
                age: document.getElementById('age').value,
                xp: document.getElementById('xp').value,
                desc: document.getElementById('desc').value,
                status: 'Pending Review'
            };
            if(!data.age || !data.xp || !data.desc) return;
            btn.innerText = "TRANSMITTING...";
            const { error } = await client.from('apps').insert([data]);
            if(!error) { alert("Sent!"); location.reload(); }
        }

        async function syncAdminFeed() {
            const { data } = await client.from('apps').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('admin-feed');
            const pending = data.filter(a => a.status === 'Pending Review');
            feed.innerHTML = pending.length === 0 ? `<p class="text-center text-gray-200 font-black text-[10px] py-20 border-2 border-dashed rounded-[2.5rem]">NO NEW APPLICATIONS</p>` : 
            pending.map(a => `
                <div class="p-10 border border-gray-100 rounded-[2.5rem] bg-white shadow-sm">
                    <div class="flex justify-between items-start mb-8">
                        <div><h4 class="text-2xl font-black italic tracking-tighter uppercase">${a.user}</h4><p class="text-[10px] font-bold gold-text tracking-widest uppercase">${a.role}</p></div>
                        <div class="flex gap-2">
                            <button onclick="updateStatus(${a.id}, 'Denied')" class="px-5 py-2 bg-red-50 text-red-500 text-[10px] font-black rounded-xl">DENY</button>
                            <button onclick="updateStatus(${a.id}, 'APPROVED')" class="px-5 py-2 bg-green-50 text-green-600 text-[10px] font-black rounded-xl">APPROVE</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-10 text-xs mb-4">
                        <div><p class="text-gray-400 font-bold uppercase text-[9px] mb-1">Age</p><p class="font-bold">${a.age}</p></div>
                        <div><p class="text-gray-400 font-bold uppercase text-[9px] mb-1">XP</p><p class="font-bold">${a.xp}</p></div>
                    </div>
                    <p class="text-xs text-gray-500 leading-relaxed">${a.desc}</p>
                </div>
            `).join('');
        }

        async function updateStatus(id, s) { await client.from('apps').update({ status: s }).eq('id', id); syncAdminFeed(); }

        async function syncUserApps() {
            const { data } = await client.from('apps').select('*').eq('user', currentUser);
            document.getElementById('user-apps').innerHTML = data.map(a => `
                <div class="flex justify-between items-center p-6 bg-gray-50 rounded-2xl border border-gray-100">
                    <span class="text-[10px] font-black uppercase text-gray-400">${a.role}</span>
                    <span class="text-[9px] font-black uppercase px-4 py-1.5 rounded-full bg-white border ${a.status === 'Denied' ? 'text-red-400' : a.status === 'APPROVED' ? 'text-green-500' : 'text-gray-300'}">${a.status}</span>
                </div>
            `).join('');
        }

        function openForm(r) { currentRole = r; document.getElementById('role-title').innerText = r; document.getElementById('form-pop').classList.remove('hidden'); }
        function closeForm() { document.getElementById('form-pop').classList.add('hidden'); }
    </script>
</body>
</html>
