<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON | Premium Applications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #171717; }
        .axon-header { font-family: 'Bodoni Moda', serif; }
        .gold-bg { background-color: #CFA050; }
        .gold-text { color: #CFA050; }
        .hidden { display: none; }
        .glass-card { border: 1px solid #f0f0f0; transition: all 0.3s ease; border-radius: 2rem; }
        .glass-card:hover { border-color: #CFA050; transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-10 py-8 border-b border-gray-50 bg-white sticky top-0 z-50">
        <div class="axon-header text-3xl italic tracking-tighter">
            AXON <span class="font-light text-[10px] tracking-[0.5em] uppercase not-italic ml-2 text-gray-300">Applications</span>
        </div>
        <div id="nav-right" class="flex items-center gap-6">
            </div>
    </nav>

    <div id="login-screen" class="max-w-md mx-auto mt-32 px-6 text-center">
        <h2 class="text-4xl font-black tracking-tighter mb-4 uppercase italic">Identity</h2>
        <input type="text" id="username-input" placeholder="Enter Discord Username" class="w-full p-5 border border-gray-100 rounded-2xl mb-4 focus:border-[#CFA050] outline-none font-bold">
        <button onclick="saveUser()" class="w-full gold-bg text-white font-black py-5 rounded-2xl hover:bg-black transition uppercase text-xs tracking-widest">Enter Terminal</button>
    </div>

    <div id="main-hub" class="max-w-6xl mx-auto py-20 px-8 hidden">
        <div id="role-grid" class="grid md:grid-cols-3 gap-8"></div>
        
        <div class="mt-24 border-t border-gray-100 pt-16">
            <h3 class="text-[10px] font-black tracking-[0.4em] uppercase text-gray-300 mb-8">Personal Status</h3>
            <div id="my-apps" class="space-y-4 text-center py-10 border-2 border-dashed border-gray-50 rounded-[2rem]">
                <p class="text-xs text-gray-300">No submission history found.</p>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="max-w-6xl mx-auto py-20 px-8 hidden">
        <h2 class="text-4xl font-black tracking-tighter mb-12 uppercase italic gold-text">Developer Terminal</h2>
        <div class="grid md:grid-cols-3 gap-6 mb-20" id="admin-controls">
            </div>
        <div class="p-10 bg-gray-50 rounded-[2rem] text-center border border-gray-100">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">System Note</p>
            <p class="text-sm mt-2 text-gray-500">All full application data is transmitted directly to your Discord Webhook channel for multi-device access.</p>
        </div>
    </div>

    <div id="form-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-md z-[100] flex items-center justify-center hidden p-6">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-12 shadow-2xl relative">
            <button onclick="closeForm()" class="absolute top-10 right-10 text-gray-300 hover:text-black font-bold">X</button>
            <h2 id="form-role-title" class="text-3xl font-black tracking-tighter uppercase mb-8 gold-text">Application</h2>
            <div class="space-y-6">
                <input type="number" id="age" placeholder="Your Age" class="w-full p-4 bg-gray-50 rounded-xl outline-none">
                <textarea id="xp" placeholder="Experience" rows="3" class="w-full p-4 bg-gray-50 rounded-xl outline-none"></textarea>
                <textarea id="desc" placeholder="Description" rows="4" class="w-full p-4 bg-gray-50 rounded-xl outline-none"></textarea>
                <button id="submit-btn" onclick="sendToDiscord()" class="w-full gold-bg text-white font-black py-5 rounded-2xl uppercase text-xs tracking-widest">Transmit</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const WEBHOOK_URL = "YOUR_DISCORD_WEBHOOK_URL"; 
        let user = localStorage.getItem('axon_username');
        let currentRole = "";

        // Application Settings (Saved to LocalStorage so Avarin's choices stay)
        let config = JSON.parse(localStorage.getItem('axon_config')) || {
            social: true, support: true, mod: true
        };

        const roles = [
            { id: "social", name: "Social Media Manager" },
            { id: "support", name: "Support Agent" },
            { id: "mod", name: "Moderation" }
        ];

        function saveUser() {
            const val = document.getElementById('username-input').value;
            if(!val) return;
            localStorage.setItem('axon_username', val);
            location.reload();
        }

        function logout() {
            localStorage.removeItem('axon_username');
            location.reload();
        }

        if(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-hub').classList.remove('hidden');
            renderNav();
            renderRoles();
            renderSavedApps();
        }

        function renderNav() {
            const navRight = document.getElementById('nav-right');
            let adminBtn = "";
            if (user === "Avarin") {
                adminBtn = `<button onclick="toggleAdminView()" id="admin-toggle-btn" class="text-[9px] font-black tracking-[0.2em] gold-text border border-[#CFA050] px-4 py-2 rounded-full hover:bg-[#CFA050] hover:text-white transition">DEVELOPER DASHBOARD</button>`;
            }
            navRight.innerHTML = `
                ${adminBtn}
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black uppercase text-gray-400">${user}</span>
                    <button onclick="logout()" class="text-gray-200 hover:text-red-500 transition">✕</button>
                </div>
            `;
        }

        function toggleAdminView() {
            const hub = document.getElementById('main-hub');
            const dash = document.getElementById('admin-dashboard');
            const btn = document.getElementById('admin-toggle-btn');

            if (dash.classList.contains('hidden')) {
                hub.classList.add('hidden');
                dash.classList.remove('hidden');
                btn.innerText = "BACK TO HUB";
                renderAdminControls();
            } else {
                hub.classList.remove('hidden');
                dash.classList.add('hidden');
                btn.innerText = "DEVELOPER DASHBOARD";
                renderRoles();
            }
        }

        function renderRoles() {
            const grid = document.getElementById('role-grid');
            grid.innerHTML = roles.map(r => `
                <div class="glass-card p-12">
                    <h3 class="text-[10px] font-black tracking-[0.3em] text-gray-400 mb-6 uppercase">${r.name}</h3>
                    <p class="text-[9px] font-bold mb-10 tracking-widest ${config[r.id] ? 'text-green-500' : 'text-red-300'}">
                        STATUS: ${config[r.id] ? 'OPEN' : 'CLOSED'}
                    </p>
                    <button onclick="openForm('${r.name}')" ${!config[r.id] ? 'disabled' : ''} 
                        class="w-full py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition 
                        ${config[r.id] ? 'bg-black text-white hover:gold-bg' : 'bg-gray-50 text-gray-200 cursor-not-allowed'}">
                        Apply
                    </button>
                </div>
            `).join('');
        }

        function renderAdminControls() {
            const container = document.getElementById('admin-controls');
            container.innerHTML = roles.map(r => `
                <div class="p-8 border border-gray-100 rounded-3xl flex flex-col gap-4">
                    <p class="text-[10px] font-black uppercase text-gray-400">${r.name}</p>
                    <button onclick="toggleRoleStatus('${r.id}')" class="w-full py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest border transition
                        ${config[r.id] ? 'border-green-200 text-green-500 bg-green-50' : 'border-red-100 text-red-400 bg-red-50'}">
                        ${config[r.id] ? 'SET TO CLOSED' : 'SET TO OPEN'}
                    </button>
                </div>
            `).join('');
        }

        function toggleRoleStatus(id) {
            config[id] = !config[id];
            localStorage.setItem('axon_config', JSON.stringify(config));
            renderAdminControls();
        }

        function openForm(name) {
            currentRole = name;
            document.getElementById('form-role-title').innerText = name;
            document.getElementById('form-overlay').classList.remove('hidden');
        }

        function closeForm() {
            document.getElementById('form-overlay').classList.add('hidden');
        }

        function sendToDiscord() {
            const btn = document.getElementById('submit-btn');
            const age = document.getElementById('age').value;
            const xp = document.getElementById('xp').value;
            const desc = document.getElementById('desc').value;

            if(!age || !xp || !desc) return alert("All fields required.");
            btn.innerText = "TRANSMITTING...";
            btn.disabled = true;

            const payload = {
                username: "AXON RECRUITMENT",
                embeds: [{
                    title: `NEW APPLICATION: ${currentRole}`,
                    color: 13606992,
                    fields: [
                        { name: "Applicant", value: user, inline: true },
                        { name: "Age", value: age, inline: true },
                        { name: "Experience", value: xp },
                        { name: "Description", value: desc }
                    ],
                    footer: { text: "Axon Hosting Management System" },
                    timestamp: new Date()
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                const myApps = JSON.parse(localStorage.getItem('axon_submissions') || "[]");
                myApps.push({ role: currentRole, date: new Date().toLocaleDateString(), status: "SENT (Wait for DM)" });
                localStorage.setItem('axon_submissions', JSON.stringify(myApps));
                alert("Application sent to Avarin!");
                location.reload();
            });
        }

        function renderSavedApps() {
            const container = document.getElementById('my-apps');
            const data = JSON.parse(localStorage.getItem('axon_submissions') || "[]");
            if(data.length > 0) {
                container.innerHTML = data.map(d => `
                    <div class="flex justify-between items-center bg-gray-50 p-6 rounded-2xl mx-auto max-w-2xl border border-gray-100 mb-2">
                        <div class="text-left">
                            <p class="text-[10px] font-black uppercase tracking-widest">${d.role}</p>
                            <p class="text-[9px] text-gray-400">${d.date}</p>
                        </div>
                        <span class="text-[9px] font-black px-4 py-1 rounded-full bg-white border border-gray-100">${d.status}</span>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
