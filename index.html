<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON | Recruitment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1c1c1c; }
        .axon-brand { font-family: 'Bodoni Moda', serif; }
        .gold-text { color: #CFA050; }
        .gold-bg { background-color: #CFA050; }
        .hidden { display: none !important; }
        .glass-card { border: 1px solid #f1f1f1; transition: all 0.3s ease; border-radius: 2rem; }
        .glass-card:hover { border-color: #CFA050; transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-12 py-8 border-b border-gray-50 bg-white sticky top-0 z-50">
        <div class="axon-brand text-4xl italic tracking-tighter">
            AXON <span class="font-light text-[10px] tracking-[0.5em] uppercase not-italic ml-2 text-gray-300">Hosting</span>
        </div>
        <div id="nav-actions" class="flex items-center gap-6">
            </div>
    </nav>

    <div id="login-view" class="max-w-md mx-auto mt-32 px-6 text-center">
        <h2 class="text-5xl font-black tracking-tighter mb-4 uppercase italic">Identity</h2>
        <p class="text-gray-400 text-xs mb-10 tracking-[0.2em] uppercase">Security Clearance Required</p>
        <input type="text" id="discord-username" placeholder="Discord Username" class="w-full p-6 border border-gray-100 rounded-2xl mb-4 focus:border-[#CFA050] outline-none font-bold text-center">
        <button onclick="login()" class="w-full gold-bg text-white font-black py-6 rounded-2xl hover:bg-black transition uppercase text-[10px] tracking-widest">Access Terminal</button>
    </div>

    <div id="hub-view" class="max-w-6xl mx-auto py-20 px-8 hidden">
        <div id="role-grid" class="grid md:grid-cols-3 gap-8">
            </div>

        <div class="mt-32 border-t border-gray-100 pt-20">
            <h3 class="text-[10px] font-black tracking-[0.4em] uppercase text-gray-300 mb-10 text-center">Application Status</h3>
            <div id="user-status-list" class="max-w-2xl mx-auto space-y-4">
                <p class="text-center text-gray-200 text-[10px] font-black py-10">NO ACTIVE TRANSMISSIONS</p>
            </div>
        </div>
    </div>

    <div id="admin-view" class="max-w-4xl mx-auto py-20 px-8 hidden">
        <div class="flex justify-between items-end mb-16">
            <div>
                <h2 class="text-5xl font-black tracking-tighter italic gold-text uppercase">Director</h2>
                <p class="text-[10px] font-black text-gray-300 tracking-[0.3em] uppercase">Internal Management</p>
            </div>
            <div id="config-toggles" class="flex gap-4">
                </div>
        </div>
        <div id="admin-feed" class="space-y-6"></div>
    </div>

    <div id="form-modal" class="fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] flex items-center justify-center hidden p-6">
        <div class="w-full max-w-xl">
            <h2 id="modal-title" class="text-4xl font-black tracking-tighter uppercase mb-10 gold-text italic"></h2>
            <div class="space-y-6">
                <input type="number" id="form-age" placeholder="Age" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold">
                <textarea id="form-xp" placeholder="Experience" rows="3" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold"></textarea>
                <textarea id="form-desc" placeholder="Why AXON?" rows="4" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold"></textarea>
                <div class="flex gap-4">
                    <button onclick="closeForm()" class="flex-1 bg-gray-100 text-gray-400 font-black py-5 rounded-2xl uppercase text-[10px]">Cancel</button>
                    <button onclick="submitApp()" class="flex-[2] gold-bg text-white font-black py-5 rounded-2xl uppercase text-[10px]">Transmit</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA ENGINE ---
        let currentUser = localStorage.getItem('axon_user');
        let currentRole = "";
        
        // System Config
        let config = JSON.parse(localStorage.getItem('axon_config')) || {
            'Support Agent': true,
            'Social Media Manager': true,
            'Moderation': true
        };

        // Master App List
        let allApps = JSON.parse(localStorage.getItem('axon_master_apps')) || [];

        // --- AUTH ---
        function login() {
            const val = document.getElementById('discord-username').value;
            if(!val) return;
            localStorage.setItem('axon_user', val);
            location.reload();
        }

        function logout() {
            localStorage.removeItem('axon_user');
            location.reload();
        }

        // --- NAVIGATION & VIEWS ---
        window.onload = () => {
            if(currentUser) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('hub-view').classList.remove('hidden');
                renderNav();
                renderCards();
                renderUserStatus();
            }
        };

        function renderNav() {
            const nav = document.getElementById('nav-actions');
            let adminBtn = (currentUser === "Avarin") ? `<button onclick="toggleAdmin()" id="adm-btn" class="text-[9px] font-black border border-[#CFA050] px-5 py-2 rounded-full gold-text uppercase tracking-widest hover:bg-[#CFA050] hover:text-white transition">Dashboard</button>` : '';
            nav.innerHTML = `
                ${adminBtn}
                <div class="text-right">
                    <p class="text-[10px] font-black uppercase text-gray-400 tracking-tighter">${currentUser}</p>
                    <button onclick="logout()" class="text-[9px] font-bold text-red-300 hover:text-red-500 uppercase">Logout</button>
                </div>
            `;
        }

        function toggleAdmin() {
            const hub = document.getElementById('hub-view');
            const adm = document.getElementById('admin-view');
            hub.classList.toggle('hidden');
            adm.classList.toggle('hidden');
            if(!adm.classList.contains('hidden')) renderAdminDashboard();
        }

        // --- HUB LOGIC ---
        function renderCards() {
            const grid = document.getElementById('role-grid');
            const roles = ['Support Agent', 'Social Media Manager', 'Moderation'];
            grid.innerHTML = roles.map(r => `
                <div class="glass-card p-12 text-center ${!config[r] ? 'opacity-50' : ''}">
                    <h3 class="text-[10px] font-black tracking-[0.4em] text-gray-300 mb-6 uppercase">${r}</h3>
                    <p class="text-[9px] font-bold mb-10 tracking-widest ${config[r] ? 'text-green-500' : 'text-red-400'}">
                        ● ${config[r] ? 'APPLICATIONS OPEN' : 'APPLICATIONS CLOSED'}
                    </p>
                    <button onclick="openForm('${r}')" ${!config[r] ? 'disabled' : ''} 
                        class="w-full py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition 
                        ${config[r] ? 'bg-black text-white hover:gold-bg' : 'bg-gray-50 text-gray-300 cursor-not-allowed'}">
                        ${config[r] ? 'Apply' : 'Closed'}
                    </button>
                </div>
            `).join('');
        }

        function openForm(role) {
            currentRole = role;
            document.getElementById('modal-title').innerText = role;
            document.getElementById('form-modal').classList.remove('hidden');
        }

        function closeForm() { document.getElementById('form-modal').classList.add('hidden'); }

        function submitApp() {
            const app = {
                id: Date.now(),
                user: currentUser,
                role: currentRole,
                age: document.getElementById('form-age').value,
                xp: document.getElementById('form-xp').value,
                desc: document.getElementById('form-desc').value,
                status: 'Pending Review'
            };
            if(!app.age || !app.xp || !app.desc) return alert("All fields required.");
            allApps.push(app);
            localStorage.setItem('axon_master_apps', JSON.stringify(allApps));
            alert("Transmission Sent.");
            location.reload();
        }

        function renderUserStatus() {
            const list = document.getElementById('user-status-list');
            const myApps = allApps.filter(a => a.user === currentUser);
            if(myApps.length > 0) {
                list.innerHTML = myApps.map(a => `
                    <div class="flex justify-between items-center bg-gray-50 p-6 rounded-3xl border border-gray-100">
                        <span class="text-[10px] font-black uppercase text-gray-400">${a.role}</span>
                        <span class="text-[9px] font-black uppercase px-5 py-2 rounded-full bg-white border 
                            ${a.status === 'APPROVED' ? 'text-green-500 border-green-100' : a.status === 'Denied' ? 'text-red-400 border-red-100' : 'text-gray-300'}">
                            ${a.status === 'APPROVED' ? 'Accepted - Check Discord DM' : a.status}
                        </span>
                    </div>
                `).join('');
            }
        }

        // --- ADMIN LOGIC ---
        function renderAdminDashboard() {
            const feed = document.getElementById('admin-feed');
            const toggles = document.getElementById('config-toggles');
            
            // Render Toggles
            toggles.innerHTML = Object.keys(config).map(r => `
                <button onclick="toggleRole('${r}')" class="text-[8px] font-black px-4 py-2 rounded-lg border uppercase tracking-widest 
                ${config[r] ? 'border-green-200 text-green-500' : 'border-red-200 text-red-400'}">
                    ${r}: ${config[r] ? 'OPEN' : 'CLOSED'}
                </button>
            `).join('');

            // Render Pending Apps
            const pending = allApps.filter(a => a.status === 'Pending Review');
            feed.innerHTML = pending.length === 0 ? `<p class="text-center py-20 text-gray-200 font-black text-[10px]">NO PENDING REQUESTS</p>` :
            pending.map(a => `
                <div class="p-10 border border-gray-100 rounded-[3rem] bg-white">
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <h4 class="text-2xl font-black italic tracking-tighter uppercase">${a.user}</h4>
                            <p class="text-[10px] font-bold gold-text uppercase tracking-widest">${a.role}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="updateStatus(${a.id}, 'Denied')" class="px-6 py-2 bg-red-50 text-red-500 text-[10px] font-black rounded-xl">DENY</button>
                            <button onclick="updateStatus(${a.id}, 'APPROVED')" class="px-6 py-2 bg-green-50 text-green-600 text-[10px] font-black rounded-xl">APPROVE</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-10 text-xs mb-4">
                        <div><p class="text-gray-400 font-bold uppercase text-[9px] mb-1">Age</p><p class="font-bold">${a.age}</p></div>
                        <div><p class="text-gray-400 font-bold uppercase text-[9px] mb-1">XP</p><p class="font-bold">${a.xp}</p></div>
                    </div>
                    <p class="text-xs text-gray-500 leading-relaxed">${a.desc}</p>
                </div>
            `).join('');
        }

        function toggleRole(role) {
            config[role] = !config[role];
            localStorage.setItem('axon_config', JSON.stringify(config));
            renderAdminDashboard();
        }

        function updateStatus(id, stat) {
            allApps = allApps.map(a => a.id === id ? {...a, status: stat} : a);
            localStorage.setItem('axon_master_apps', JSON.stringify(allApps));
            renderAdminDashboard();
        }
    </script>
</body>
</html>
